# ============================================================
# Traefik static configuration for ALFA Reports
# Domain: bot.scalper.com → ALFA container (port 3000)
# Save this to: /etc/traefik/traefik.yml on the VPS
# Or run Traefik via docker compose (see traefik-stack.yml)
# ============================================================

api:
  dashboard: true
  insecure: false

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: true
  https:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
  file:
    filename: /etc/traefik/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@scalper.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: http

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log
