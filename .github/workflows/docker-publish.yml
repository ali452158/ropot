name: Build and Push Docker Image

# This workflow builds the Docker image and pushes it to Docker Hub.
# Hostinger Docker Manager pulls the image from there.
#
# Setup (one-time):
#   1. Create Docker Hub Access Token: https://hub.docker.com/settings/security
#   2. Add GitHub Secrets:
#      - DOCKERHUB_USERNAME  (your Docker Hub username)
#      - DOCKERHUB_TOKEN     (the access token from step 1)
#   Repo URL: https://github.com/USER/REPO/settings/secrets/actions

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/alfa-reports
          tags: |
            type=raw,value=latest
            type=sha,prefix=commit-,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/alfa-reports:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/alfa-reports:buildcache,mode=max

      - name: Image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"
