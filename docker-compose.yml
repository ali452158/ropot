# ============================================================
# ALFA Reports — docker-compose.yml (Hostinger VPS, no Traefik)
# ============================================================
# Standalone version — no Traefik proxy needed.
# The container runs on port 3000 directly.
#
# For HTTPS/domain setup, see DEPLOY-HOSTINGER.md → Traefik section.
# ============================================================

services:
  alfa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alfa-reports
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/db/custom.db
    volumes:
      # Persist SQLite DB across container restarts
      - alfa_db:/app/db
    networks:
      - alfa-net

volumes:
  alfa_db:
    driver: local

networks:
  alfa-net:
    driver: bridge
